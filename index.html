<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Password Generator</title>
    <!-- Load Inter font via Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap&family=JetBrains+Mono&display=swap" rel="stylesheet"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Inter', 'system-ui', sans-serif;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        main {
            width: 100%;
            max-width: 500px;
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            padding: 40px;
        }

        header {
            margin-bottom: 32px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 16px;
            color: #71717a;
            font-weight: 400;
        }

        section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #3f3f46;
        }

        input {
            height: 44px;
            width: 100%;
            border: 1px solid #d4d4d8;
            border-radius: 4px;
            padding: 0 16px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            color: #1a1a2e;
            transition: border-color 0.2s ease;
        }

        input::placeholder {
            color: #a1a1a6;
        }

        input:focus {
            outline: 2px solid #1a1a2e;
            outline-offset: -1px;
        }

        .helper-text {
            font-size: 12px;
            color: #71717a;
        }

        .error-message {
            font-size: 12px;
            color: #ef4444;
            font-weight: 500;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        button {
            height: 44px;
            width: 100%;
            background-color: #1a1a2e;
            color: #ffffff;
            font-weight: 600;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: rgba(26, 26, 46, 0.9);
        }

        button:active {
            transform: scale(0.99);
        }

        #resultSection {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #f0f0f0;
        }

        #resultSection.show {
            display: flex;
        }

        .result-label {
            font-size: 14px;
            font-weight: 600;
            color: #3f3f46;
            margin-bottom: 8px;
            display: block;
        }

        .password-container {
            display: flex;
            gap: 8px;
        }

        #passwordDisplay {
            flex: 1;
            height: 44px;
            background-color: #f5f5f5;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            color: #1a1a2e;
            word-break: break-all;
            overflow-x: auto;
            white-space: nowrap;
        }

        #copyBtn {
            height: 44px;
            padding: 0 24px;
            background-color: #ffffff;
            border: 1px solid #1a1a2e;
            color: #1a1a2e;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        #copyBtn:hover {
            background-color: #1a1a2e;
            color: #ffffff;
        }

        #copyBtn:active {
            transform: scale(0.99);
        }

        .success-message {
            font-size: 12px;
            color: #22c55e;
            font-weight: 500;
            margin-top: 8px;
            display: none;
        }

        .success-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <!-- BEGIN: Main Generator Card -->
    <main data-purpose="generator-container">
        <!-- BEGIN: Header Section -->
        <header>
            <h1>Password Generator</h1>
            <p class="subtitle">Securely generate passwords based on time.</p>
        </header>
        <!-- END: Header Section -->

        <!-- BEGIN: Form Section -->
        <section data-purpose="input-controls">
            <!-- Input Group -->
            <div class="input-group">
                <label for="timeInput">Enter Time (24-hour format)</label>
                <input 
                    class="time-input" 
                    id="timeInput" 
                    maxlength="4" 
                    placeholder="e.g., 1300" 
                    type="text"
                />
                <p class="helper-text" id="helperText">Format: HHMM (0000-2359)</p>
                <p class="error-message" id="errorMessage"></p>
            </div>

            <!-- Action Button -->
            <button data-purpose="generate-action" id="generateBtn">
                Generate
            </button>
        </section>
        <!-- END: Form Section -->

        <!-- BEGIN: Result Section -->
        <section data-purpose="output-area" id="resultSection">
            <label class="result-label" for="passwordDisplay">Your Password</label>
            <div class="password-container">
                <div id="passwordDisplay"></div>
                <button data-purpose="copy-action" id="copyBtn">Copy</button>
            </div>
            <p class="success-message" id="successMessage">Password copied to clipboard!</p>
        </section>
        <!-- END: Result Section -->
    </main>
    <!-- END: Main Generator Card -->

    <!-- BEGIN: Logic Scripts -->
    <script data-purpose="password-logic">
        const timeInput = document.getElementById('timeInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultSection = document.getElementById('resultSection');
        const passwordDisplay = document.getElementById('passwordDisplay');
        const errorMessage = document.getElementById('errorMessage');
        const helperText = document.getElementById('helperText');
        const successMessage = document.getElementById('successMessage');
        const copyBtn = document.getElementById('copyBtn');

        function validateTime(time) {
            if (!/^\d{4}$/.test(time)) return false;
            const hh = parseInt(time.substring(0, 2));
            const mm = parseInt(time.substring(2, 4));
            return hh >= 0 && hh <= 23 && mm >= 0 && mm <= 59;
        }

        function generatePassword(time) {
            // Original logic: step1 = 9999 - time, password = step1 * 8354
            const timeNum = parseInt(time);
            const step1 = 9999 - timeNum;
            const password = step1 * 8354;
            return password.toString();
        }

        generateBtn.addEventListener('click', () => {
            const val = timeInput.value.trim();
            
            if (validateTime(val)) {
                errorMessage.classList.remove('show');
                helperText.style.display = 'block';
                
                const pwd = generatePassword(val);
                passwordDisplay.textContent = pwd;
                resultSection.classList.add('show');
                
                // Reset success state
                successMessage.classList.remove('show');
                copyBtn.textContent = 'Copy';
            } else {
                errorMessage.textContent = 'Please enter a valid 24-hour time (0000-2359).';
                errorMessage.classList.add('show');
                helperText.style.display = 'none';
                resultSection.classList.remove('show');
            }
        });

        // Handle Enter key on input
        timeInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateBtn.click();
            }
        });

        // Copy button handler
        copyBtn.addEventListener('click', () => {
            const pwd = passwordDisplay.textContent;
            if (!pwd) return;

            navigator.clipboard.writeText(pwd).then(() => {
                copyBtn.textContent = 'Copied';
                successMessage.classList.add('show');
                
                setTimeout(() => {
                    copyBtn.textContent = 'Copy';
                    successMessage.classList.remove('show');
                }, 3000);
            });
        });
    </script>
    <!-- END: Logic Scripts -->
</body>
</html>
